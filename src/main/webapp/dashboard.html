<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #f4f6f8;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            text-decoration: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 20px;
        }

        .header .user {
            font-size: 14px;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            color: #1e293b;
        }

        /* Section */
        .section {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            body {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>SecureBank</h2>

        <a href="dashboard">Dashboard</a>
        <a href="view-balance">View Balance</a>
        <a href="transfer">Transfer Money</a>
        <a href="transactions">Transactions</a>
        <a href="/securebank/">Logout</a>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Header -->
        <div class="header">
            <h1>Dashboard</h1>
            <div class="user">Welcome, User</div>
        </div>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Balance</h3>
                <p>₹ 0.00</p>
            </div>

            <div class="card">
                <h3>Last Transaction</h3>
                <p>₹ 0.00</p>
            </div>

            <div class="card">
                <h3>Transfers</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Account Status</h3>
                <p>Active</p>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="section">
            <h3>Recent Activity</h3>
            <p>No transactions yet...</p>
        </div>

    </div>

</body>

</html>
