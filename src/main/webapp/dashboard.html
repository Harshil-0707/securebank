<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/securebank/css/dashboardStyle.css">

    <title>SecureBank Dashboard</title>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>SecureBank</h2>

        <a href="/securebank/bank/dashboard">Dashboard</a>
        <a href="/securebank/bank/dashboard/view-balance">View Balance</a>
        <a href="/securebank/bank/dashboard/transfer">Transfer Money</a>
        <a href="/securebank/bank/dashboard/transactions">Transactions</a>
        <a href="/securebank/">Logout</a>

    </div>

    <!-- Main -->
    <div class="main">

        <!-- Header -->
        <div class="header">
            <h1>Dashboard</h1>
            <div class="user">Welcome, <span id="userName">User</span></div>
        </div>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Balance</h3>
                <p>₹ <span id="balance">0.00</span></p>
            </div>

            <div class="card">
                <h3>Last Transaction</h3>
                <p>₹ <span id="lastTransactionAmount">0.00</span></p>
            </div>

            <div class="card">
                <h3>Transfers</h3>
                <p>0</p>
            </div>

            <div class="card">
                <h3>Account Status</h3>
                <p>Active</p>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="section">
            <h3>Recent Activity</h3>
            <p>No transactions yet...</p>
        </div>

    </div>

</body>

<script>
    window.addEventListener("DOMContentLoaded", () => {
        fetch("http://localhost:8080/securebank/bank/dashboard/api/")
            .then(data => data.json())
            .then(data => fillData(data))
            .catch(e => console.error("Error fetching data: ", e));

        function fillData(data) {
            const { name, balance, lastTransactionAmount } = data;
            document.querySelector("#userName").textContent = name;
            document.querySelector("#balance").textContent = balance;
            document.querySelector("#lastTransactionAmount").textContent = lastTransactionAmount;

        }
    });
</script>

</html>
