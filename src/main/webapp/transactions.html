<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/securebank/css/dashboardStyle.css">

    <title>Transactions</title>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>SecureBank</h2>

        <a href="/securebank/bank/dashboard">Dashboard</a>
        <a href="/securebank/bank/dashboard/view-balance">View Balance</a>
        <a href="/securebank/bank/dashboard/transfer">Transfer Money</a>
        <a href="/securebank/bank/dashboard/transactions">Transactions</a>
        <a href="/securebank/">Logout</a>

    </div>

    <!-- Main -->
    <div class="main">
        <h3>All the Transactions</h3>
        <p id="transactions">No transactions yet...</p>
    </div>
</body>

<script>

    window.addEventListener("DOMContentLoaded", () => {
        fetch("http://localhost:8080/securebank/bank/dashboard/transactions/api/")
            .then(data => data.json())
            .then(data => fillData(data))
            .catch(e => console.error("Error fetching data: ", e));

        function fillData(data) {
            document.getElementById("transactions").innerHTML =
                data.map((v) => {
                    const type = v.transactionType.toLowerCase();
                    const sign = type === "deposit" || type === "transfer_in" ? "+" : "-";

                    return `
                        <div class="txn-card">
                            
                            <div class="txn-icon ${type}">
                                ${type === "deposit" || type === "transfer_in" ? "↑" : "↓"}
                            </div>

                            <div class="txn-details">
                                <p class="txn-title">${v.transactionType.split("_").join(" ")}</p>
                                <p class="txn-sub">Acc: ${v.accountNumber}</p>
                                <p class="txn-time">${new Date(v.transactionTime).toLocaleString()}</p>
                            </div>

                            <div class="txn-amount ${type}">
                                ${sign} ₹${v.transactionAmount}
                            </div>

                        </div>
                    `;
                }).join("");

        }
    });

    async function logout() {
        fetch("http://localhost:8080/securebank/logout")
            .then(data => data.json())
            .then(data => {
                if (data.message === "Success") {
                    setTimeout(() => {
                        window.location.href = "http://localhost:8080/securebank/";
                    }, 100);
                } else {
                    console.log(data.message);
                }
            })
            .catch(e => console.error("Error logging out: ", e));
    }
</script>

</html>
